{% if meta %}
<div class="header-controls">
  <input type="hidden" name="current_time_sec" id="current_time_sec" value="{{ state.current_time_sec }}" form="timeline-form" />
  <form class="inline"
        hx-post="/editor/{{ session_id }}/htmx/controls"
        hx-target="#header-controls-mount"
        hx-swap="innerHTML"
        hx-trigger="change delay:150ms from:input[name='volume']">
    <label class="muted small">Vol</label>
    <input id="volume_slider" type="range" name="volume" min="0" max="1" step="0.01" value="{{ state.volume }}" />
  </form>
  <button type="button" class="btn btn-primary" id="export-btn" data-session="{{ session_id }}">Export</button>
</div>
{% else %}
<div class="header-controls muted small">Upload audio to enable controls</div>
{% endif %}
